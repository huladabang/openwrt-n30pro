name: 编译磊科 N30Pro 固件

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ssh:
        description: '是否开启 SSH 调试 (true/false)'
        required: false
        default: 'false'

env:
  REPO_URL: https://github.com/padavanonly/immortalwrt-mt798x-6.6
  REPO_BRANCH: openwrt-24.10-6.6
  CONFIG_FILE: defconfig/n30pro.config
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 检出本仓库
        uses: actions/checkout@v4

      - name: 初始化编译环境
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get update -y
          sudo apt-get full-upgrade -y
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk \
            gettext gcc-multilib g++-multilib git gnutls-dev gperf haveged help2man intltool \
            lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev \
            libmpc-dev libmpfr-dev libncurses-dev libpython3-dev libreadline-dev libssl-dev \
            libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp ninja-build \
            p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils \
            python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig \
            texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: 克隆源码
        working-directory: /workdir
        run: |
          df -hT $PWD
          git clone -b $REPO_BRANCH --single-branch --filter=blob:none $REPO_URL openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: 注入 N30Pro DTS 文件
        run: |
          cp $GITHUB_WORKSPACE/dts/mt7981b-netcore-n30pro.dts \
             /workdir/openwrt/target/linux/mediatek/dts/mt7981b-netcore-n30pro.dts
          cp $GITHUB_WORKSPACE/dts/mt7981b-netis-common.dtsi \
             /workdir/openwrt/target/linux/mediatek/dts/mt7981b-netis-common.dtsi
          echo "DTS 文件注入完成"

      - name: 注入 N30Pro 设备定义到 filogic.mk
        run: |
          FILOGIC_MK="/workdir/openwrt/target/linux/mediatek/image/filogic.mk"
          if grep -q "netcore_n30pro" "$FILOGIC_MK"; then
            echo "N30Pro 定义已存在，跳过"
          else
            echo "" | base64 -d >> "$FILOGIC_MK"
            echo "N30Pro 设备定义追加完成"
          fi

      - name: 添加自定义 Feeds
        working-directory: /workdir/openwrt
        run: |
          echo "src-git istore https://github.com/linkease/istore;main" >> feeds.conf.default
          echo "src-git istore_app https://github.com/linkease/istore-ui;main" >> feeds.conf.default

      - name: 克隆 OpenClash
        working-directory: /workdir/openwrt
        run: |
          mkdir -p package/custom
          git clone --depth=1 https://github.com/vernesong/OpenClash.git package/custom/openclash

      - name: 更新并安装 Feeds
        working-directory: /workdir/openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          ./scripts/feeds install -a -p istore
          ./scripts/feeds install -a -p istore_app

      - name: 加载自定义配置
        working-directory: /workdir/openwrt
        run: |
          cp $GITHUB_WORKSPACE/$CONFIG_FILE .config
          echo "# CONFIG_PACKAGE_kmod-qmi_wwan_f is not set" >> .config
          echo "# CONFIG_PACKAGE_kmod-qmi_wwan_q is not set" >> .config
          echo "# CONFIG_PACKAGE_kmod-qmi_wwan_m is not set" >> .config
          echo "# CONFIG_PACKAGE_kmod-usb-net-qmi-wwan-quectel is not set" >> .config
          echo "# CONFIG_PACKAGE_kmod-usb-net-qmi-wwan-fibocom is not set" >> .config
          make defconfig

      - name: SSH 调试 (可选)
        uses: mxschmitt/action-tmate@v3
        if: github.event.inputs.ssh == 'true'
        with:
          limit-access-to-actor: true

      - name: 下载依赖包
        working-directory: /workdir/openwrt
        run: |
          make download -j8
          find dl -size -1024c -exec rm -f {} \;

      - name: 开始编译
        id: compile
        working-directory: /workdir/openwrt
        run: |
          echo -e "$(nproc) 线程编译"
          make -j$(nproc) || make -j1 || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT
          echo "FILE_DATE=$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

      - name: 检查磁盘空间
        if: (!cancelled())
        run: df -hT

      - name: 上传固件到 Artifacts
        uses: actions/upload-artifact@v4
        if: steps.compile.outputs.status == 'success'
        with:
          name: 磊科N30Pro固件_${{ env.FILE_DATE }}
          path: /workdir/openwrt/bin/targets/mediatek/filogic/*netcore_n30pro*
          retention-days: 14

      - name: 创建 Release
        uses: ncipollo/release-action@v1
        if: steps.compile.outputs.status == 'success'
        with:
          tag: N30Pro-${{ env.FILE_DATE }}
          name: 磊科 N30Pro 固件 ${{ env.FILE_DATE }}
          body: |
            ## 磊科 N30Pro ImmortalWrt 固件

            ### 固件信息
            - **源码**: padavanonly/immortalwrt-mt798x-6.6
            - **分支**: openwrt-24.10-6.6
            - **编译时间**: ${{ env.FILE_DATE }}

            ### 硬件配置
            - CPU: MT7981B 双核 1.3GHz
            - RAM: 512MB | Flash: 128MB NAND
            - 交换机: MT7531AE | 无线: MT7976CN
            - 网口: 1x WAN + 4x LAN | USB 3.0

            ### 内置插件
            - OpenClash / iStore / USB上网 / ttyd终端 / 文件浏览器

            ### 刷机方法
            通过 hanwckf uboot Web 界面上传 `*sysupgrade.bin`
          artifacts: /workdir/openwrt/bin/targets/mediatek/filogic/*netcore_n30pro*
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
